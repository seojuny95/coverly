repos:
  - repo: local
    hooks:
      - id: backend-ruff-check
        name: backend ruff check
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: backend-ruff-format-check
        name: backend ruff format check
        entry: bash -c 'cd backend && uv run ruff format --check .'
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: frontend-eslint
        name: frontend eslint
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx]
      - id: frontend-prettier-check
        name: frontend prettier check
        entry: bash -c 'cd frontend && pnpm format:check'
        language: system
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]
